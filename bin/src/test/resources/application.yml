      secret: test-secret-key-123456789012345678901234567890
      issuer: test-issuer
      access-token-minutes: 60
      refresh-token-days: 7
  model:
    artifacts-path: ./target/test-artifacts
  admin:
    seed-admin-email: admin@test.local
    seed-admin-password: Admin@123
  dataset:
    bootstrap:
      enabled: false
